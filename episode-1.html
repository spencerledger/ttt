<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triple T Talks - E1</title>

  <link rel="icon" type="image/x-icon" href="https://cdn.spencers.zone/images/SLFavicon.ico" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      padding: 40px 20px;
    }

    header {
      margin-top: 20px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 15px;
      color: #d1d5db;
      max-width: 700px;
      line-height: 1.6;
      font-size: 1rem;
    }

    .player-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .play-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.35);
    }

    .play-button:hover {
      transform: scale(1.08);
      background: #2563eb;
    }

    audio {
      width: 320px;
      max-width: 90vw;
    }

    /* ===== FOOTER ===== */
    footer {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .footer-left {
      flex: 0 0 auto;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn img {
      width: 28px;
      height: 28px;
    }

    .footer-content {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      flex: 1;
      flex-wrap: wrap;
    }

    .cc-link img {
      width: 90px;
      height: auto;
    }

    .footer-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
    }

    .footer-text a {
      color: #d1d5db;
      text-decoration: underline;
    }

    .footer-text a:hover {
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>Triple T Talks: E1 | Spencer Ledger</h1>

    <p class="subtitle">
      In Episode 1, Spencer joins as the special guest.
    </p>
  </header>

  <main class="player-container">

    <button class="play-button" id="playBtn">▶</button>

    <audio id="podcastPlayer" controls>
      <source src="https://ia600704.us.archive.org/9/items/triple-t-talks-e1/episode1.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

  </main>

  <footer>
    
    <!-- Back Button (far left) -->
    <div class="footer-left">
      <button class="back-btn" onclick="history.back()">
        <img src="https://cdn.spencers.zone/images/arrow-left.svg" alt="Back">
      </button>
    </div>

    <!-- Center footer content -->
    <div class="footer-content">

      <a class="cc-link" href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">
        <img src="https://cdn.spencers.zone/images/cc-by-nc-nd.png" alt="CC BY-NC-ND">
      </a>

      <div class="footer-text">
        <div>
          If you have any suggestions contact
          <a href="mailto:tripletalks@gmail.com">tripletalks@gmail.com</a>
        </div>

        <div>
          If you see a problem with the site
          <a href="https://clicks.spencers.zone/error">click here</a>
        </div>
      </div>

    </div>

  </footer>

  <script>
    const playBtn = document.getElementById('playBtn');
    const player = document.getElementById('podcastPlayer');

    playBtn.addEventListener('click', () => {
      if (player.paused) {
        player.play();
        playBtn.textContent = '❚❚';
      } else {
        player.pause();
        playBtn.textContent = '▶';
      }
    });

    player.addEventListener('ended', () => {
      playBtn.textContent = '▶';
    });
  </script>

</body>
</html>
